[package]
name = "nexus"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"

[dependencies]
bevy_ecs = "0.19"
bytemuck = { version = "1.25", features = ["derive"] }
egui = "0.35"
egui-wgpu = "0.35"
